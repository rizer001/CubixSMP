# ╔════════════════════════════════════════════════════════════════════╗
# ║                    CubixSMP Configuration                         ║
# ║                       Version 1.2                                 ║
# ╚════════════════════════════════════════════════════════════════════╝
#
# 🔗 Полное руководство: https://github.com/rizer001/CubixSMP
#
# ═════════════════════════════════════════════════════════════════════
# 📊 НАСТРОЙКИ СИСТЕМЫ УРОВНЕЙ
# ═════════════════════════════════════════════════════════════════════
# Настройки расположены сверху, сообщения — снизу (раздел "messages:").
# При изменении этого файла используйте /cubixsmp reload
# или перезагрузите сервер.

# ─────────────────────────────────────────────
# 📊 SYSTEM — Основные настройки системы уровней
# ─────────────────────────────────────────────
settings:
  # Формула XP на уровень: base + (level * multiplier)
  # Пример: уровень 0→1 = 100 XP, уровень 1→2 = 100 + 1*1.5 = 101.5 XP
  xp-base: 100
  xp-multiplier: 1.5
  max-level: 100

  # 🚶 Настройки XP за дистанцию
  distance-interval: 1000     # блоков на один тик XP
  xp-per-distance-interval: 5 # XP за каждый интервал

  # 📢 Способ отправки XP-уведомлений: true = actionbar, false = чат
  use-actionbar: true

  # ⏱ Настройки XP за отыгранное время
  playtime-interval: 1800     # секунд на один тик XP (1800 = 30 мин)
  xp-per-playtime-interval: 10

  # ☀ Ежедневный бонус
  daily-bonus-xp: 50          # XP за /cubixsmp daily

  # 👑 Топ игроков
  leaders-limit: 10           # сколько игроков показывать в /cubixsmp leaders

# ═════════════════════════════════════════════════════════════════════
# ⛏ 1. MINING — Опыт за добычу руд
# ═════════════════════════════════════════════════════════════════════
# Опыт начисляется только за натурально заспавненные руды.
# Проверка: блок окружён натуральным камнем (stone, deepslate, netherrack и т.д.)
mining:
  enabled: true
  blocks:
    # Уголь
    COAL_ORE: 1.0
    DEEPSLATE_COAL_ORE: 1.0
    # Медь
    COPPER_ORE: 2.0
    DEEPSLATE_COPPER_ORE: 2.0
    # Железо
    IRON_ORE: 3.0
    DEEPSLATE_IRON_ORE: 3.0
    # Кварц (Nether)
    NETHER_QUARTZ_ORE: 3.0
    # Золото
    GOLD_ORE: 4.0
    DEEPSLATE_GOLD_ORE: 4.0
    # Лазурит
    LAPIS_ORE: 4.0
    DEEPSLATE_LAPIS_ORE: 4.0
    # Редстоун
    REDSTONE_ORE: 4.0
    DEEPSLATE_REDSTONE_ORE: 4.0
    # Алмазы
    DIAMOND_ORE: 5.0
    DEEPSLATE_DIAMOND_ORE: 5.0
    # Древние обломки
    ANCIENT_DEBRIS: 10.0

    # ✨ Дополнительные руды (можно добавить свои)
    # NETHER_GOLD_ORE: 2.0
    # EMERALD_ORE: 6.0
    # DEEPSLATE_EMERALD_ORE: 6.0

# ═════════════════════════════════════════════════════════════════════
# 🌾 2. FARMING — Опыт за фермерство
# ═════════════════════════════════════════════════════════════════════
# Опыт даётся только за полностью созревшие культуры.
# Для тыквы/арбуза — за сломанный блок.
farming:
  enabled: true
  # 🚫 Отключить вытаптывание грядок (игроки и мобы не превращают FARMLAND в DIRT)
  no-trampling: true
  crops:
    # Культуры (только созревшие, age = max)
    WHEAT: 0.5
    CARROTS: 0.5
    POTATOES: 0.5
    # Блоки (без age)
    PUMPKIN: 1.0
    MELON: 1.0
    # Ягоды (age >= 2)
    SWEET_BERRY_BUSH: 0.5
    # Мёд (через BlockDropItemEvent)
  honey:
    HONEY_BOTTLE: 5.0
    HONEYCOMB: 2.0

# ═════════════════════════════════════════════════════════════════════
# 🌲 3. WOODCUTTING — Опыт за рубку деревьев
# ═════════════════════════════════════════════════════════════════════
# Опыт начисляется только за деревья, выросшие натурально
# (проверка: под бревном натуральная земля/камень, рядом листва)
woodcutting:
  enabled: true
  # 🪓 Топор не теряет прочность при ломании листвы (удобно при рубке деревьев)
  axe-no-durability-loss: true
  logs:
    # Переопределённые дубы
    OAK_LOG: 0.2
    DARK_OAK_LOG: 0.2
    # Ель
    SPRUCE_LOG: 0.2
    # Берёза
    BIRCH_LOG: 0.2
    # Тропическое дерево
    JUNGLE_LOG: 0.2
    # Акация
    ACACIA_LOG: 0.2
    # Мангровое дерево
    MANGROVE_LOG: 0.2
    # Вишня
    CHERRY_LOG: 0.2
    # Бледный дуб
    PALE_OAK_LOG: 0.2
    # Адские стебли
    CRIMSON_STEM: 0.2
    WARPED_STEM: 0.2

# ═════════════════════════════════════════════════════════════════════
# 🎣 4. FISHING — Опыт за рыбалку
# ═════════════════════════════════════════════════════════════════════
# Начисляется за каждую пойманную рыбу (COD, SALMON, PUFFERFISH, TROPICAL_FISH)
fishing:
  enabled: true
  xp-per-catch: 5.0

# ═════════════════════════════════════════════════════════════════════
# ⚔ 5. HUNTING — Опыт за охоту на мобов
# ═════════════════════════════════════════════════════════════════════
# Опыт начисляется только за натурально заспавненных мобов
# (не из спавнера, не из яйца призыва, не через команду)
# Используется Paper API + fallback на проверку спавнеров рядом
hunting:
  enabled: true
  mobs:
    # Враждебные мобы
    ZOMBIE: 3.0
    SKELETON: 3.0
    SPIDER: 3.0
    CREEPER: 4.0
    ENDERMAN: 5.0
    WITCH: 5.0
    BLAZE: 6.0
    # Адские мобы
    HOGLIN: 4.0
    PIGLIN: 3.0
    ZOMBIFIED_PIGLIN: 3.0
    PIGLIN_BRUTE: 5.0
    ZOGLIN: 4.0
    GHAST: 5.0
    # Пещерные
    CAVE_SPIDER: 3.0
    SILVERFISH: 1.0
    SLIME: 2.0
    MAGMA_CUBE: 2.0
    # Особые
    PHANTOM: 4.0
    WARDEN: 50.0
    ELDER_GUARDIAN: 20.0
    WITHER_SKELETON: 5.0
    DROWNED: 3.0
    HUSK: 3.0
    STRAY: 3.0
    BOGGED: 3.0
    BREEZE: 6.0
    CREAKING: 5.0
    # Разбойники
    PILLAGER: 3.0
    VINDICATOR: 4.0
    EVOKER: 8.0
    RAVAGER: 10.0

    # ✨ Можно добавить любых других мобов:
    # WITHER: 100.0
    # ENDER_DRAGON: 200.0
    # ALLAY: 1.0
    # FROG: 1.0
    # GOAT: 2.0

# ═════════════════════════════════════════════════════════════════════
# 📢 6. CHAT PING — @пнг в чате
# ═════════════════════════════════════════════════════════════════════
# Позволяет пинговать игроков через @ник, @everyone, @admins в чате.
# Пингуемый текст выделяется жирным + подчёркнутым.
# Пингуемые игроки слышат звуковой сигнал (можно отключить через /csmp ping).
chat-ping:
  enabled: true
  # Формат пинга (LEGACY). &l = жирный, &n = подчёркнутый, &r = сброс
  mention-format: "&l&n@%s&r"
  # Звук пинга (название из Minecraft: ENTITY_EXPERIENCE_ORB_PICKUP, BLOCK_NOTE_BLOCK_PLING и т.д.)
  ping-sound: "BLOCK_NOTE_BLOCK_PLING"
  # Громкость звука пинга (0.0 - 2.0)
  ping-sound-volume: 0.8
  # Высота звука пинга (0.5 - 2.0)
  ping-sound-pitch: 1.5
  # Типы пингов
  ping-types:
    # @everyone — пинг всех онлайн-игроков
    everyone:
      enabled: true
      # Право для использования @everyone (по умолчанию у всех)
      permission: "cubixsmp.ping.everyone"
    # @admins / @admin / @ops — пинг администрации
    admins:
      enabled: true
      # Право для использования @admins
      permission: "cubixsmp.ping.admins"
      # Кто считается админом (цель для пинга). Игроки с этим правом будут слышать @admins
      target-permission: "cubixsmp.ping.admins-target"

# ═════════════════════════════════════════════════════════════════════
# 🔄 7. CHAT PLACEHOLDERS — Пер-плеерные плейсхолдеры в чате
# ═════════════════════════════════════════════════════════════════════
# Когда игрок пишет в чат сообщение с %cubixsmp_...% — каждый получатель
# видит это заменённым на СВОЁ значение (не значение отправителя).
# Пример: "Мой ур. %cubixsmp_level%" → Игрок Б увидит свой уровень.
chat-placeholders:
  enabled: true

# ═════════════════════════════════════════════════════════════════════
# 📊 8. PLAYTIME TRACKER — Ежедневный онлайн игроков
# ═════════════════════════════════════════════════════════════════════
# Трекинг времени входа/выхода с разбивкой по дням.
# Логи хранятся N дней, после чего автоматически очищаются.
# Команда: /checkonline [ник]
playtime-tracker:
  enabled: true
  # Сколько дней хранить логи (старые автоматически удаляются)
  log-retention-days: 7
  # Интервал автосохранения в минутах
  auto-save-interval: 5
  # Интервал автоочистки в минутах
  auto-cleanup-interval: 60

# ═════════════════════════════════════════════════════════════════════
# 💬 СООБЩЕНИЯ ПЛАГИНА (переводимые)
# ═════════════════════════════════════════════════════════════════════
# Все сообщения, которые плагин отправляет игрокам.
# Вы можете переводить и изменять их без перекомпиляции JAR.
#
# После изменения выполните /cubixsmp reload.
#
# Цветовые коды:
#   §0-§f — стандартные Minecraft цвета
#   §l — жирный   §n — подчёркнутый   §o — курсив   §m — зачёркнутый
#
# Плейсхолдеры (заменяются автоматически):
#   {player}  — имя игрока
#   {level}   — уровень
#   {xp}      — количество опыта
#   {needed}  — XP до следующего уровня
#   {max}     — максимальный уровень
#   {amount}  — количество (XP, блоков, минут и т.д.)
#   {action}  — название действия (шахтёрство, фермерство и т.д.)
#   {target}  — целевой игрок (для админ-команд)
messages:
  # ─── Общие сообщения ─────────────────────────
  general:
    player_only: "§c❌ Только игрок может использовать эту команду!"
    no_permission: "§c❌ У вас нет прав на это действие!"
    player_not_found: "§c❌ Игрок §e{player} §cне найден!"
    config_reloaded: "§a✔ Конфигурация CubixSMP перезагружена!"
    already_daily: "§c❌ Вы уже получили ежедневный бонус сегодня!"
    console_not_allowed: "§c❌ Эту команду нельзя выполнять из консоли без указания игрока!"

  # ─── XP Уведомления ──────────────────────────
  xp:
    mining: "§7⛏ §a+{amount} XP §7(Шахтёрство)"
    farming: "§7🌾 §a+{amount} XP §7({action})"
    woodcutting: "§7🌲 §a+{amount} XP §7(Рубка деревьев)"
    fishing: "§7🎣 §a+{amount} XP §7(Рыбалка)"
    hunting: "§7⚔ §a+{amount} XP §7({action})"
    distance: "§7🚶 §a+{amount} XP §7(Пройдено {blocks} блоков)"
    playtime: "§7⏱ §a+{amount} XP §7за игру ({minutes} мин)"
    daily_bonus_claim: "§6☀ §eЕжедневный бонус: §a+{amount} XP"
    level_up: "§a✦ §eLevel Up! §7Теперь ты §e{level} §7уровня! §a✦"

  # ─── Названия действий (для xp.farming и xp.hunting) ──
  names:
    wheats: "Пшеница"
    carrots: "Морковь"
    potatoes: "Картошка"
    pumpkin: "Тыква"
    melon: "Арбуз"
    berry: "Ягоды"
    honey_bottle: "Мёд"
    honeycomb: "Соты"

  # ─── Команда /cubixsmp ─────────────────────
  command:
    help_header: "§6CubixSMP §7v{version}"
    help_player:
      - "§e/cubixsmp §7— показать статистику"
      - "§e/cubixsmp daily §7— ежедневный бонус"
      - "§e/cubixsmp sound §7— вкл/выкл звук XP"
      - "§e/cubixsmp leaders §7— топ игроков"
    help_admin:
      - "§e/cubixsmp §7— показать статистику"
      - "§e/cubixsmp stats §7— статистика"
      - "§e/cubixsmp daily §7— ежедневный бонус"
      - "§e/cubixsmp sound §7— вкл/выкл звук XP"
      - "§e/cubixsmp leaders §7— топ игроков"
      - "§e/cubixsmp reload §7— перезагрузить конфиг"
      - "§e/cubixsmp admin <sub> §7— админ-команды"

    # Звук XP
    sound_on: "§a✔ Звук XP §a§lВКЛЮЧЁН"
    sound_off: "§c✔ Звук XP §c§lВЫКЛЮЧЕН"

    # Топ игроков
    leaders_header: "§6╔═══════════════════════════════╗"
    leaders_title: "§6║ §lТоп игроков §r§6              ║"
    leaders_footer: "§6╚═══════════════════════════════╝"
    leaders_empty: "§7Пока нет данных для топа."
    leaders_entry_format: "§f#{rank} §e{player} §7— §eУровень {level} §7({xp} XP)"

