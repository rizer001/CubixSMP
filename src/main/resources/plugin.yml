name: CubixSMP
version: '1.0.0'
main: com.cubixsmp.CubixSMP
api-version: '1.21'
description: Level system for Cubix server
author: rizer001

softdepend:
  - PlaceholderAPI

commands:
  cubixsmp:
    description: Main CubixSMP command
    aliases: [cs, cubix, csmp]
    permission: cubixsmp.user

  checkonline:
    description: "Просмотр ежедневного онлайна игрока"
    aliases: [online, playtime]
    permission: cubixsmp.checkonline

permissions:
  cubixsmp.user:
    default: true
    description: "Базовые команды: /cubixsmp, /cubixsmp daily, /cubixsmp stats"

  cubixsmp.checkonline:
    default: true
    description: "Просмотр своего онлайна (/checkonline)"

  cubixsmp.checkonline.other:
    default: op
    description: "Просмотр онлайна других игроков (/checkonline <ник>)"

  cubixsmp.reload:
    default: op
    description: "Перезагрузка конфига (/cubixsmp reload)"

  cubixsmp.admin:
    default: op
    description: "Доступ ко всем админ-командам"

  cubixsmp.admin.setlevel:
    default: op
    description: "Установить уровень игроку (/cubixsmp admin setlevel <player> <level>)"

  cubixsmp.admin.addxp:
    default: op
    description: "Добавить XP игроку (/cubixsmp admin addxp <player> <amount>)"

  cubixsmp.admin.removexp:
    default: op
    description: "Забрать XP у игрока (/cubixsmp admin removexp <player> <amount>)"

  cubixsmp.admin.reset:
    default: op
    description: "Сбросить прогресс игрока (/cubixsmp admin reset <player>)"

  cubixsmp.admin.info:
    default: op
    description: "Показать информацию о игроке (/cubixsmp admin info <player>)"